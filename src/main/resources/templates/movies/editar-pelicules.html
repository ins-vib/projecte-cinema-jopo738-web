<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>CinemaDaw</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>

        <h2>EDITAR LA PELICULA:</h2>
        <form th:action="@{/pelicula/edit}" th:object="${pelicula}" method="post">

            <input type="text" th:field="*{id}" hidden/><br><br>
            
            <label>Títol:</label><br>
            <input type="text" th:field="*{títol}"/><br><br>

            <label>Durada:</label><br>
            <input type="text" th:field="*{durada}"/><br><br>

            <label>Gènere:</label><br>
           <input type="text"th:field="*{genere}"/><br><br>

            <label>Descripció:</label><br>
            <input type="text"th:field="*{descripcio}"/><br><br>

            <label>Data estrena:</label><br>
            <input type="date"th:field="*{data_estrena}"/><br><br>

            <button type="submit">Guardar</button>

        </form>

        <footer>
            <p>2026 Cinema Daw</p>
        </footer>
    </body>
</html>
