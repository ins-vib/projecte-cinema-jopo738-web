<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:replace="~{layout :: layout(~{::content})}">

    <div th:fragment="content">

        <h2>EDITAR SEAT:</h2>
        <form th:action="@{/seats/edit}" th:object="${seat}" method="post">

            <input type="text" th:field="*{id}" hidden/><br><br>
            
            <label>Tipus:</label><br>
            <input type="text" th:field="*{seatType}"/><br><br>
           


            <label>Posició x:</label><br>
            <input type="number" th:field="*{posX}"/><br><br>
            

            <label>Posició y:</label><br>
            <input type="number"th:field="*{posY}"/><br><br>
            

            <label>Numero:</label><br>
            <input type="number"th:field="*{number}"/><br><br>
          

            <button type="submit">Guardar</button>

        </form>

    </div>
</div>
    </body>
</html>
