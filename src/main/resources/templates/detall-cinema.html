        <section>
            <h2><strong>DETALLS CINEMA:</strong></h2>
            <p><strong>Nom:</strong> <span th:text="${cinema.name}">Nom del Cinema</span></p>
            <p><strong>Ciutat:</strong> <span th:text="${cinema.city}">Ciutat</span></p>
            <p><strong>Adreça:</strong> <span th:text="${cinema.address}">Adreça</span></p>
            
            <!-- <div class="cinema-actions">
                <a th:href="@{/cinema/update/{id}(id=${cinema.id})}">Editar Cinema</a> |

            </div> -->
        </section>

        <hr>

        <section>
            <h2><strong>SALES D'AQUEST CINEMA:</strong></h2>
            <a th:href="@{/room/create/{id}(id=${cinema.id})}">Afegeix nova sala</a>
            
            <ul style="margin-top: 20px;">
                <li th:each="sala : ${cinema.rooms}">
                    <strong>ID:</strong> <span th:text="${sala.id}">ID</span><br>
                    <strong>Nom de la sala:</strong> <span th:text="${sala.name}">Nom Sala</span><br>
                    <strong>Capacitat:</strong> <span th:text="${sala.capacity}">0</span> persones<br>
                    
                    <div style="margin-top: 8px;">
                        <a th:href="@{/room/{id}(id=${sala.id})}">
                            Veure detall de la sala
                        </a>
                    </div>
                    <div style="margin-top: 8px;">
                        <a th:href="@{/room/{id}/edit(id=${sala.id})}">
                            Editar sala
                        </a>
                    </div>
                    <div style="margin-top: 8px;">
                        <a th:href="@{/room/{id}/delete(id=${sala.id})}">
                            Eliminar sala
                        </a>
                    </div>
                </li>
                <li th:if="${#lists.isEmpty(cinema.rooms)}">Aquest cinema encara no té sales.</li>
            </ul>
        </section>


        

    </div>
