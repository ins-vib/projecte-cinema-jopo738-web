<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:replace="~{layout :: layout(~{::content})}">

    <div th:fragment="content">

        <h2>EDITAR SALA:</h2>
        <form th:action="@{/room/edit}" th:object="${sala}" method="post">

            <input type="hidden" th:field="*{id}"/><br><br>
            
            <label>Nom:</label><br>
            <input type="text" th:field="*{name}"/><br><br>
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" ></p>

            <label>Capacitat:</label><br>
            <input type="number" th:field="*{capacity}"/><br><br>
            <p th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></p>

            

            <button type="submit">Guardar</button>

        </form>

    </div>
</div>
    </body>
</html>
